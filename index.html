<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Birthday Surprise for Simran</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <video autoplay muted loop playsinline>
        <source src="Flow_202603192109.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <div class="sparkles" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <audio id="bgMusic">
        <source src="audio.mp3" type="audio/mp3">
    </audio>

    <main class="hero-shell">
        <section class="hero-card">
            <p class="eyebrow">A tiny surprise before the main memory wall</p>
            <h1 class="hero-title">Press play and let the page soften a little.</h1>
            <p class="hero-copy">Your day, your moments, your memories</p>

            <div class="hero-actions">
                <button id="triggerBtn" class="trigger-btn">
                    <span class="btn-label">Open the music player</span>
                    <span class="btn-note">Start with a melodious voice</span>
                </button>
                <button class="secondary-btn" onclick="goNext()">
                    <span>Enter the birthday page</span>
                    <span class="secondary-icon">&hearts;</span>
                </button>
            </div>
        </section>
    </main>

    <div class="music-player" id="musicPlayer">
        <div class="player-orb"></div>

        <div class="player-header">
            <div>
                <p class="player-kicker">Now playing</p>
                <h2>Favorite songs</h2>
            </div>
            <div class="track-count">6 tracks</div>
        </div>

        <div class="player-top">
            <div class="cover-frame">
                <img src="image.png" alt="Cover" class="cover-image">
            </div>
            <div class="song-info">
                <div class="song-title">so easy</div>
                <div class="artist-name">Simran</div>
            </div>
            <div class="playing-icon" aria-hidden="true">
                <span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="player-middle">
            <span id="currentTime" class="time">0:00</span>
            <div class="progress-wrap">
                <div class="progress-container">
                    <input type="range" id="progressBar" value="0" min="0" max="100">
                </div>
                <div class="progress-caption">
                    <span>Soft playlist for today</span>
                    <span id="songIndex">1 / 6</span>
                </div>
            </div>
            <span id="remainingTime" class="time right">-0:00</span>
        </div>

        <div class="player-bottom">
            <button class="control-btn" id="prevBtn" title="Previous">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                </svg>
            </button>
            <button class="control-btn play-btn" id="playBtn" title="Play">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
            <button class="control-btn" id="nextBtn" title="Next">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        function goNext() {
            window.location.href = "page2.html";
        }
    </script>

</body>

</html>
